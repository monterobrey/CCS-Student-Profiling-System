[phases.setup]
nixPkgs = [
    "php82",
    "php82Extensions.pdo",
    "php82Extensions.pdo_mysql",
    "php82Extensions.mysqli",
    "php82Extensions.mbstring",
    "php82Extensions.xml",
    "php82Extensions.curl",
    "php82Extensions.zip",
    "php82Extensions.bcmath",
    "php82Extensions.gd",
    "php82Extensions.fileinfo",
    "php82Extensions.tokenizer",
    "php82Packages.composer"
]

[phases.install]
cmds = [
    "composer validate --strict 2>&1 || true",
    "composer install --no-dev --no-interaction --ignore-platform-reqs --prefer-dist 2>&1"
]

[start]
cmd = "php artisan config:cache && php artisan route:cache && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"